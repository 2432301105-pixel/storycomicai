version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: storycomicai-postgres
    environment:
      POSTGRES_DB: storycomicai
      POSTGRES_USER: storycomicai
      POSTGRES_PASSWORD: storycomicai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: storycomicai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
