services:
  - type: web
    name: storycomicai-api
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r api/requirements.txt
    startCommand: bash infra/render/start_api.sh
    healthCheckPath: /v1/health/live
    autoDeploy: true
    envVars:
      - key: SC_ENV
        value: staging
      - key: SC_DEBUG
        value: false
      - key: SC_API_PREFIX
        value: /v1
      - key: SC_RUN_MIGRATIONS_ON_START
        value: true
      - key: SC_JOB_QUEUE_MODE
        value: inline
      - key: SC_DATABASE_URL
        fromDatabase:
          name: storycomicai-postgres
          property: connectionString
      - key: SC_REDIS_URL
        fromService:
          type: redis
          name: storycomicai-redis
          property: connectionString
      - key: SC_CELERY_BROKER_URL
        fromService:
          type: redis
          name: storycomicai-redis
          property: connectionString
      - key: SC_CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: storycomicai-redis
          property: connectionString
      - key: SC_AUTH_JWT_SECRET
        generateValue: true
      - key: SC_APPLE_CLIENT_ID
        sync: false
      - key: SC_ALLOW_UNVERIFIED_APPLE_TOKEN_IN_LOCAL
        value: true
      - key: SC_STORAGE_PROVIDER
        value: mock
      - key: SC_STORAGE_BUCKET
        value: storycomicai-free
      - key: SC_STORAGE_REGION
        sync: false
      - key: SC_STORAGE_ENDPOINT_URL
        sync: false
      - key: SC_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: SC_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: SC_STORAGE_SESSION_TOKEN
        sync: false
      - key: SC_STORAGE_PUBLIC_BASE_URL
        sync: false
      - key: SC_AI_RENDER_PROVIDER
        value: mock
      - key: SC_AI_RENDER_PROVIDER_BASE_URL
        sync: false
      - key: SC_AI_RENDER_PROVIDER_API_KEY
        sync: false
      - key: SC_AI_RENDER_PROVIDER_MODEL_ID
        value: storycomicai-panel-v1
      - key: SC_AI_RENDER_PROVIDER_ADAPTER_ID
        sync: false
      - key: SC_AI_RENDER_PROVIDER_SUBMIT_PATH
        value: /render/panels
      - key: SC_AI_RENDER_PROVIDER_STATUS_PATH_TEMPLATE
        value: /render/jobs/{job_id}
      - key: SC_AI_RENDER_PROVIDER_POLL_INTERVAL_MS
        value: 1000
      - key: SC_AI_RENDER_PROVIDER_MAX_POLL_SECONDS
        value: 90
      - key: SC_AI_RENDER_PROVIDER_AUTH_HEADER
        value: Authorization
      - key: SC_AI_RENDER_PROVIDER_AUTH_SCHEME
        value: Bearer

  - type: redis
    name: storycomicai-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: storycomicai-postgres
    plan: free
