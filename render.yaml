services:
  - type: web
    name: storycomicai-api
    env: python
    plan: starter
    buildCommand: |
      pip install --upgrade pip
      pip install -r api/requirements.txt -r workers/requirements.txt
    startCommand: bash infra/render/start_api.sh
    healthCheckPath: /v1/health/live
    autoDeploy: true
    envVars:
      - key: SC_ENV
        value: production
      - key: SC_DEBUG
        value: false
      - key: SC_API_PREFIX
        value: /v1
      - key: SC_RUN_MIGRATIONS_ON_START
        value: true
      - key: SC_DATABASE_URL
        fromDatabase:
          name: storycomicai-postgres
          property: connectionString
      - key: SC_REDIS_URL
        fromService:
          type: redis
          name: storycomicai-redis
          property: connectionString
      - key: SC_CELERY_BROKER_URL
        fromService:
          type: redis
          name: storycomicai-redis
          property: connectionString
      - key: SC_CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: storycomicai-redis
          property: connectionString
      - key: SC_AUTH_JWT_SECRET
        generateValue: true
      - key: SC_APPLE_CLIENT_ID
        sync: false
      - key: SC_ALLOW_UNVERIFIED_APPLE_TOKEN_IN_LOCAL
        value: false
      - key: SC_STORAGE_PROVIDER
        value: mock
      - key: SC_STORAGE_BUCKET
        value: storycomicai-production

  - type: worker
    name: storycomicai-worker
    env: python
    plan: starter
    buildCommand: |
      pip install --upgrade pip
      pip install -r api/requirements.txt -r workers/requirements.txt
    startCommand: bash infra/render/start_worker.sh
    autoDeploy: true
    envVars:
      - key: SC_ENV
        value: production
      - key: SC_DEBUG
        value: false
      - key: SC_API_PREFIX
        value: /v1
      - key: SC_DATABASE_URL
        fromDatabase:
          name: storycomicai-postgres
          property: connectionString
      - key: SC_REDIS_URL
        fromService:
          type: redis
          name: storycomicai-redis
          property: connectionString
      - key: SC_CELERY_BROKER_URL
        fromService:
          type: redis
          name: storycomicai-redis
          property: connectionString
      - key: SC_CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: storycomicai-redis
          property: connectionString
      - key: SC_AUTH_JWT_SECRET
        sync: false
      - key: SC_APPLE_CLIENT_ID
        sync: false
      - key: SC_ALLOW_UNVERIFIED_APPLE_TOKEN_IN_LOCAL
        value: false
      - key: SC_STORAGE_PROVIDER
        value: mock
      - key: SC_STORAGE_BUCKET
        value: storycomicai-production

  - type: redis
    name: storycomicai-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: storycomicai-postgres
    plan: starter
